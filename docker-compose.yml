services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: chorechart
      POSTGRES_USER: chorechart
      POSTGRES_PASSWORD: chorechart
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chorechart"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    ports:
      - "3013:3001"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: chorechart
      DB_USER: chorechart
      DB_PASSWORD: chorechart
      SESSION_SECRET: change-me-in-production
      PORT: 3001
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  uploads:
